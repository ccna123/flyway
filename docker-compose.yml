version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: flyway-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: flyway
      POSTGRES_PASSWORD: flyway_secret
      POSTGRES_DB: flywaydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flyway -d flywaydb"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: flyway-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./migrations:/tmp/flyway-sql
    environment:
      AWS_ACCESS_KEY_ID: AKIAZ5WTWXRJUV4FMENU
      AWS_SECRET_ACCESS_KEY: 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
      AWS_REGION: ap-northeast-1
      APP_ENV: local
      FLASK_DEBUG: "true"
      SECRET_KEY: "dev-secret-key"
      DB_TYPE: postgresql
      DB_HOST: flyway-postgres
      DB_PORT: "5432"
      DB_NAME: flywaydb
      DB_USER: flyway
      DB_PASSWORD: flyway_secret
      DB_SCHEMA: public
      SQL_DIR: /tmp/flyway-sql
      RELEASE: true
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
