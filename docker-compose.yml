version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: flyway-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: flyway
      POSTGRES_PASSWORD: flyway_secret
      POSTGRES_DB: flywaydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flyway -d flywaydb"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flyway-app
    restart: unless-stopped
    volumes:
      - ./migrations:/tmp/flyway-sql
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flyway-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NGINX_USER=${NGINX_USER:-admin}
      - NGINX_PASS=${NGINX_PASS:-admin}
    depends_on:
      - app

volumes:
  pgdata:
