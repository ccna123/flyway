version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: flyway-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: flyway
      POSTGRES_PASSWORD: flyway_secret
      POSTGRES_DB: flywaydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flyway -d flywaydb"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: flyway-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./migrations:/tmp/flyway-sql
    env_file:
      - .env
    environment:
      - JAVA_ARGS=-Djava.net.preferIPv4Stack=true
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
