version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: "ap-northeast-1"
    ECR_REPO_FRONTEND: "flyway-frontend"
    ECR_REPO_BACKEND: "flyway-backend"
    ECS_CLUSTER: "jinzaicompass-migrate-cluster"
    TASK_DEFINITION_FAMILY: "migration-task-df"
    CONTAINER_NAME_FRONTEND: "flyway-frontend-container"
    CONTAINER_NAME_BACKEND: "flyway-backend-container"

phases:
  pre_build:
    commands:
      - echo "=== Logging in to Amazon ECR ==="
      - AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY

      - echo "=== Setting image tags ==="
      - IMAGE_TAG=${CODEBUILD_RESOLVED_SOURCE_VERSION:-latest}
      - IMAGE_TAG=${IMAGE_TAG:0:8}

      - FRONTEND_IMAGE="${ECR_REGISTRY}/${ECR_REPO_FRONTEND}:${IMAGE_TAG}"
      - BACKEND_IMAGE="${ECR_REGISTRY}/${ECR_REPO_BACKEND}:${IMAGE_TAG}"

      - echo "Frontend image -> $FRONTEND_IMAGE"
      - echo "Backend image  -> $BACKEND_IMAGE"

  build:
    commands:
      - echo "=== Building Frontend image ==="
      - docker build -t $FRONTEND_IMAGE ./frontend

      - echo "=== Building Backend image ==="
      - docker build -t $BACKEND_IMAGE ./backend

  post_build:
    commands:
      - echo "=== Pushing images to ECR ==="
      - docker push $FRONTEND_IMAGE
      - docker push $BACKEND_IMAGE

      - FRONTEND_LATEST="${ECR_REGISTRY}/${ECR_REPO_FRONTEND}:latest"
      - BACKEND_LATEST="${ECR_REGISTRY}/${ECR_REPO_BACKEND}:latest"
      - docker tag $FRONTEND_IMAGE $FRONTEND_LATEST && docker push $FRONTEND_LATEST
      - docker tag $BACKEND_IMAGE $BACKEND_LATEST && docker push $BACKEND_LATEST

      - echo "=== Fetching current Task Definition ==="
      - aws ecs describe-task-definition --task-definition $TASK_DEFINITION_FAMILY --query taskDefinition --output json > /tmp/task_def.json

      - echo "=== Injecting new image URIs ==="
      - |
        cat > /tmp/update_task.py << 'PYEOF'
        import json, os

        with open('/tmp/task_def.json') as f:
            task_def = json.load(f)

        for c in task_def.get('containerDefinitions', []):
            if c['name'] == os.environ['CONTAINER_NAME_FRONTEND']:
                c['image'] = os.environ['FRONTEND_IMAGE']
                c['essential'] = True
                c['logConfiguration'] = {
                    'logDriver': 'awslogs',
                    'options': {
                        'awslogs-group': '/ecs/migration-task-df',
                        'awslogs-create-group': 'true',
                        'awslogs-region': 'ap-northeast-1',
                        'awslogs-stream-prefix': 'ecs'
                    }
                }                 
            elif c['name'] == os.environ['CONTAINER_NAME_BACKEND']:
                c['image'] = os.environ['BACKEND_IMAGE']
                c['essential'] = True
                c['logConfiguration'] = {
                    'logDriver': 'awslogs',
                    'options': {
                        'awslogs-group': '/ecs/migration-task-df',
                        'awslogs-create-group': 'true',
                        'awslogs-region': 'ap-northeast-1',
                        'awslogs-stream-prefix': 'ecs'
                    }
                }
                # Merge: giữ secrets/env cũ từ task def, override non-secret vars
                backend_env = {e['name']: e for e in c.get('environment', [])}
                for key, val in [('RELEASE', 'true'), ('APP_ENV', 'prod'), ('SQL_DIR', '/tmp/flyway-sql')]:
                    backend_env[key] = {'name': key, 'value': val}
                c['environment'] = list(backend_env.values())

        keep = [
            'family', 'taskRoleArn', 'executionRoleArn', 'networkMode',
            'containerDefinitions', 'volumes', 'placementConstraints',
            'requiresCompatibilities', 'cpu', 'memory',
            'tags', 'pidMode', 'ipcMode', 'proxyConfiguration',
            'inferenceAccelerators', 'ephemeralStorage', 'runtimePlatform',
        ]
        clean = {k: v for k, v in task_def.items() if k in keep}
        clean['cpu'] = '1024'   
        clean['memory'] = '2048' 

        with open('/tmp/new_task_def.json', 'w') as f:
            json.dump(clean, f)

        print("Done. Written to /tmp/new_task_def.json")
        PYEOF
      - python3 /tmp/update_task.py
      - echo "=== New task def JSON ==="
      - cat /tmp/new_task_def.json

      - echo "=== Registering new Task Definition revision ==="
      - NEW_TASK_DEF_ARN=$(aws ecs register-task-definition --cli-input-json file:///tmp/new_task_def.json --query 'taskDefinition.taskDefinitionArn' --output text)
      - echo "New Task Definition ARN $NEW_TASK_DEF_ARN"

      - echo "=== Running ECS Task ==="
      - |
        aws ecs run-task \
          --cluster $ECS_CLUSTER \
          --task-definition $NEW_TASK_DEF_ARN \
          --launch-type FARGATE \
          --network-configuration "awsvpcConfiguration={subnets=[subnet-02145208a3f7df54d],securityGroups=[sg-0d20fc0838975d429],assignPublicIp=ENABLED}"

      - echo "=== Build & Deploy completed successfully ==="

      - |
        printf '[{"name":"%s","imageUri":"%s"},{"name":"%s","imageUri":"%s"}]' \
          "$CONTAINER_NAME_FRONTEND" "$FRONTEND_IMAGE" \
          "$CONTAINER_NAME_BACKEND" "$BACKEND_IMAGE" \
          > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
